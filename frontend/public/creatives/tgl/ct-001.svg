<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Space Grotesk','DM Sans','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041020"/>
      <stop offset="0.55" stop-color="#06223f"/>
      <stop offset="1" stop-color="#03101e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#0F6CBD" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0F6CBD" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#0F6CBD" stroke-width="1" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- node motif -->
  <g stroke="#0F6CBD" stroke-width="2" opacity="0.85" fill="none">
    <path d="M980 150 L1080 230 M1080 230 L1010 350 M1080 230 L1150 320 M980 150 L920 280 M920 280 L1010 350"/>
  </g>
  <g fill="#0F6CBD">
    <circle cx="980" cy="150" r="9"/><circle cx="1080" cy="230" r="13"/>
    <circle cx="1010" cy="350" r="9"/><circle cx="1150" cy="320" r="7"/>
    <circle cx="920" cy="280" r="7"/>
  </g>

  <!-- header -->
  <text x="80" y="92" fill="#5A8FC4" font-size="20" font-weight="600" letter-spacing="4">A TESE · 01</text>
  <g transform="translate(1040,70)">
    <rect x="0" y="0" width="80" height="34" rx="8" fill="#0F6CBD"/>
    <text x="40" y="24" fill="#fff" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="2">TGL</text>
  </g>

  <!-- headline -->
  <text x="80" y="300" fill="#ffffff" font-size="66" font-weight="700" letter-spacing="-2">Sua empresa não precisa</text>
  <text x="80" y="372" fill="#ffffff" font-size="66" font-weight="700" letter-spacing="-2">de mais um site.</text>
  <text x="80" y="470" fill="#0F6CBD" font-size="66" font-weight="700" letter-spacing="-2">Automação sob medida.</text>

  <text x="80" y="528" fill="#CDCFD2" font-size="26" font-weight="400">Software que trabalha enquanto você dorme.</text>

  <!-- footer -->
  <text x="80" y="628" fill="#5A5E64" font-size="20" font-weight="600" letter-spacing="2">tgl-solutions.com.br</text>
  <g transform="translate(980,612)">
    <rect x="0" y="2" width="36" height="2" fill="#0F6CBD"/>
    <text x="150" y="9" fill="#CDCFD2" font-size="20" font-weight="600" text-anchor="end">Diagnóstico grátis</text>
  </g>
</svg>
