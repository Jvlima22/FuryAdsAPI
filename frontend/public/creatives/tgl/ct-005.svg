    <text x="40" y="24" fill="#fff" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="2">TGL</text>
  </g>

  <text x="80" y="320" fill="#041020" font-size="64" font-weight="700" letter-spacing="-2">Do caos no caderno</text>
  <text x="80" y="390" fill="#041020" font-size="64" font-weight="700" letter-spacing="-2">ao</text>
  <text x="172" y="390" fill="#0F6CBD" font-size="64" font-weight="700" letter-spacing="-2">processo digital.</text>

  <text x="80" y="470" fill="#5A5E64" font-size="26" font-weight="400">Digitalizamos e automatizamos seus processos sob medida.</text>

  <text x="80" y="628" fill="#9aa1a8" font-size="20" font-weight="600" letter-spacing="2">tgl-solutions.com.br</text>
  <g transform="translate(0,612)">
