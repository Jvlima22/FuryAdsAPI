<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Space Grotesk','DM Sans','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041020"/>
      <stop offset="0.5" stop-color="#072a4d"/>
      <stop offset="1" stop-color="#03101e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.42" r="0.45">
      <stop offset="0" stop-color="#0F6CBD" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0F6CBD" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#0F6CBD" stroke-width="1" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- agent orbit motif -->
  <g transform="translate(1045,275)">
    <circle r="120" fill="none" stroke="#0F6CBD" stroke-width="1.5" opacity="0.25"/>
    <circle r="78" fill="none" stroke="#0F6CBD" stroke-width="1.5" opacity="0.35"/>
    <circle r="30" fill="#0F6CBD"/>
    <path d="M-14 0 a14 14 0 0 1 28 0 M0 -14 v8 M-8 6 h16" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <g fill="#7db4e6">
      <circle cx="78" cy="0" r="8"/><circle cx="-55" cy="55" r="8"/>
      <circle cx="-55" cy="-55" r="8"/><circle cx="0" cy="120" r="6"/>
      <circle cx="-104" cy="-60" r="6"/>
    </g>
  </g>

  <text x="80" y="92" fill="#5A8FC4" font-size="20" font-weight="600" letter-spacing="4">AGENTES DE IA · 03</text>
  <g transform="translate(1040,70)">
    <rect x="0" y="0" width="80" height="34" rx="8" fill="#0F6CBD"/>
    <text x="40" y="24" fill="#fff" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="2">TGL</text>
  </g>

  <text x="80" y="320" fill="#ffffff" font-size="64" font-weight="700" letter-spacing="-2">Agentes de IA que</text>
  <text x="80" y="390" fill="#ffffff" font-size="64" font-weight="700" letter-spacing="-2">trabalham</text>
  <text x="392" y="390" fill="#0F6CBD" font-size="64" font-weight="700" letter-spacing="-2">24/7.</text>

  <text x="80" y="470" fill="#CDCFD2" font-size="26" font-weight="400">Atendimento, vendas e backoffice no automático — sob medida.</text>

  <text x="80" y="628" fill="#5A5E64" font-size="20" font-weight="600" letter-spacing="2">tgl-solutions.com.br</text>
  <g transform="translate(0,612)">
    <rect x="960" y="2" width="36" height="2" fill="#0F6CBD"/>
    <text x="1120" y="9" fill="#CDCFD2" font-size="20" font-weight="600" text-anchor="end">Quero saber mais</text>
  </g>
</svg>
